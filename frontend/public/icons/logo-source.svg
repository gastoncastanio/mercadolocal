    <!-- Líneas verticales del cesto -->
    <line x1="228" y1="228" x2="236" y2="296"/>
    <line x1="284" y1="228" x2="286" y2="296"/>
    <line x1="340" y1="228" x2="332" y2="296"/>
    <!-- Línea horizontal media del cesto -->
    <line x1="186" y1="260" x2="380" y2="260"/>
  </g>

  <!-- Ruedas -->
  <circle cx="222" cy="368" r="24" fill="#ffffff"/>
  <circle cx="346" cy="368" r="24" fill="#ffffff"/>
</svg>